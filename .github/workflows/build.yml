name: Build and Release

on:
  push:
    tags:
      - 'v[0-9]*'  # 匹配 v 开头的版本号
  workflow_dispatch:  # 支持手动触发

# 添加权限声明，允许创建 Release
permissions:
  contents: write


jobs:
  build:
    # 排除 beta/alpha/rc 版本 (这些由 build-beta.yml 处理)
    if: ${{ !contains(github.ref_name, '-beta') && !contains(github.ref_name, '-alpha') && !contains(github.ref_name, '-rc') }}
    runs-on: windows-latest
    strategy:
      matrix:
        include:
          - variant: standard
            requirements: requirements.txt
            suffix: ""
            display_name: "标准版"
          - variant: shield
            requirements: requirements-shield.txt
            suffix: "_Shield"
            display_name: "Shield 增强版"
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies (${{ matrix.display_name }})
        run: |
          python -m pip install --upgrade pip
          pip install -r ${{ matrix.requirements }}
      
      - name: Download FFmpeg
        run: |
          $url = "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip"
          $dirName = "ffmpeg-master-latest-win64-gpl"
          Invoke-WebRequest -Uri $url -OutFile "ffmpeg.zip"
          Expand-Archive -Path "ffmpeg.zip" -DestinationPath "ffmpeg_temp"
          New-Item -ItemType Directory -Force -Path "bin"
          Copy-Item "ffmpeg_temp\$dirName\bin\ffmpeg.exe" -Destination "bin\"
          Copy-Item "ffmpeg_temp\$dirName\bin\ffprobe.exe" -Destination "bin\"
          Remove-Item -Recurse -Force "ffmpeg_temp"
          Remove-Item "ffmpeg.zip"
      
      - name: Inject version to src/_version.py
        run: |
          $version = "${{ github.ref_name }}"
          if (-not $version -or $version -eq "") { 
            $version = "dev" 
          } else {
            $version = $version -replace '^v', ''
          }
          Write-Host "Injecting version: $version"
          
          $content = Get-Content "src/_version.py" -Raw -Encoding UTF8
          $content = $content -replace '__version__:\s*str\s*=\s*.*', "__version__: str = `"$version`""
          Set-Content "src/_version.py" -Value $content -Encoding UTF8 -NoNewline
          
          Get-Content "src/_version.py" | Select-String -Pattern '__version__'
      
      - name: Build with PyInstaller (${{ matrix.display_name }})
        run: |
          pyinstaller XiaoXueToolbox.spec --noconfirm
      
      - name: Get version
        id: version
        run: |
          $version = "${{ github.ref_name }}"
          if (-not $version) { $version = "dev" }
          echo "VERSION=$version" >> $env:GITHUB_OUTPUT
      
      - name: Create release package (${{ matrix.display_name }})
        run: |
          Compress-Archive -Path "dist\XiaoXueToolbox\*" -DestinationPath "XiaoXueToolbox_${{ steps.version.outputs.VERSION }}${{ matrix.suffix }}_Windows_x64.zip"
      
      - name: Upload artifact (${{ matrix.display_name }})
        uses: actions/upload-artifact@v4
        with:
          name: XiaoXue-Video-Tools-${{ steps.version.outputs.VERSION }}${{ matrix.suffix }}
          path: XiaoXueToolbox_${{ steps.version.outputs.VERSION }}${{ matrix.suffix }}_Windows_x64.zip
          retention-days: 30
      
      - name: Extract changelog for this version
        if: startsWith(github.ref, 'refs/tags/')
        id: changelog
        shell: python
        run: |
          import re, os
          tag = os.environ.get("GITHUB_REF_NAME", "").lstrip("v")
          text = open("CHANGELOG.md", encoding="utf-8").read()
          # Match the section for this version (or latest if tag not found)
          pattern = r'(## \[' + re.escape(tag) + r'\].*?)(?=\n## \[|\Z)'
          m = re.search(pattern, text, re.DOTALL)
          if not m:
              # Fallback: grab the first version section
              m = re.search(r'(## \[\d+\.\d+\.\d+\].*?)(?=\n## \[|\Z)', text, re.DOTALL)
          body = m.group(1).strip() if m else "详见 CHANGELOG.md"
          # Write to GITHUB_OUTPUT (multiline)
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as f:
              f.write("BODY<<CHANGELOG_EOF\n")
              f.write(body + "\n")
              f.write("CHANGELOG_EOF\n")

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: XiaoXueToolbox_${{ steps.version.outputs.VERSION }}${{ matrix.suffix }}_Windows_x64.zip
          generate_release_notes: false
          draft: false
          prerelease: false
          name: "小雪工具箱 ${{ github.ref_name }}"
          body: |
            ## 小雪工具箱 ${{ github.ref_name }}
            
            ### 版本选择
            
            | 版本 | 说明 |
            |------|------|
            | `XiaoXueToolbox_${{ github.ref_name }}_Windows_x64.zip` | 标准版，包含全部基础功能 |
            | `XiaoXueToolbox_${{ github.ref_name }}_Shield_Windows_x64.zip` | Shield 增强版，额外包含露骨图片识别功能 |
            
            ### 下载说明
            - 解压后运行 `XiaoXueToolbox.exe` 即可
            - **标准版**: 内置静态 FFmpeg，包含全部基础功能
            - **Shield 增强版**: 额外包含 AI 露骨图片识别功能
            
            ---
            
            ${{ steps.changelog.outputs.BODY }}
            
            详细更新日志请查看 [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md)

