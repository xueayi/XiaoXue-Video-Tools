name: Build Beta Release

on:
  push:
    tags:
      - 'v*-beta*'    # 匹配 v1.5.0-beta.1 格式
      - 'v*-rc*'      # 匹配 v1.5.0-rc.1 格式
      - 'v*-alpha*'   # 匹配 v1.5.0-alpha.1 格式
  workflow_dispatch:  # 支持手动触发
    inputs:
      version:
        description: 'Beta 版本号 (如 v1.5.0-beta.1)'
        required: false
        default: 'dev'

# 添加权限声明，允许创建 Release
permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    strategy:
      matrix:
        include:
          - variant: standard
            requirements: requirements.txt
            suffix: ""
            display_name: "标准版"
            ffmpeg_type: static
          - variant: lite
            requirements: requirements.txt
            suffix: "_Lite"
            display_name: "轻量版"
            ffmpeg_type: shared
          - variant: shield
            requirements: requirements-shield.txt
            suffix: "_Shield"
            display_name: "Shield 增强版"
            ffmpeg_type: static
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies (${{ matrix.display_name }})
        run: |
          python -m pip install --upgrade pip
          pip install -r ${{ matrix.requirements }}
      
      - name: Download FFmpeg (${{ matrix.ffmpeg_type }})
        run: |
          $ffmpegType = "${{ matrix.ffmpeg_type }}"
          if ($ffmpegType -eq "shared") {
            $url = "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl-shared.zip"
            $dirName = "ffmpeg-master-latest-win64-gpl-shared"
          } else {
            $url = "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip"
            $dirName = "ffmpeg-master-latest-win64-gpl"
          }
          Invoke-WebRequest -Uri $url -OutFile "ffmpeg.zip"
          Expand-Archive -Path "ffmpeg.zip" -DestinationPath "ffmpeg_temp"
          New-Item -ItemType Directory -Force -Path "bin"
          Copy-Item "ffmpeg_temp\$dirName\bin\ffmpeg.exe" -Destination "bin\"
          Copy-Item "ffmpeg_temp\$dirName\bin\ffprobe.exe" -Destination "bin\"
          if ($ffmpegType -eq "shared") {
            Copy-Item "ffmpeg_temp\$dirName\bin\*.dll" -Destination "bin\"
          }
          Remove-Item -Recurse -Force "ffmpeg_temp"
          Remove-Item "ffmpeg.zip"
      
      - name: Get version
        id: version
        run: |
          # 优先使用 tag，否则使用手动输入，最后回退到 dev
          $version = "${{ github.ref_name }}"
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $version = "${{ github.event.inputs.version }}"
          }
          if (-not $version -or $version -eq "" -or $version -eq "refs/heads/dev") { 
            $version = "dev-$(Get-Date -Format 'yyyyMMdd-HHmm')" 
          }
          echo "VERSION=$version" >> $env:GITHUB_OUTPUT
          echo "Version: $version"
      
      - name: Inject version to src/_version.py
        run: |
          $version = "${{ steps.version.outputs.VERSION }}"
          $version_clean = $version -replace '^v', ''
          Write-Host "Injecting version: $version_clean"
          
          $content = Get-Content "src/_version.py" -Raw -Encoding UTF8
          $content = $content -replace '__version__:\s*str\s*=\s*.*', "__version__: str = `"$version_clean`""
          Set-Content "src/_version.py" -Value $content -Encoding UTF8 -NoNewline
          
          Get-Content "src/_version.py" | Select-String -Pattern '__version__'
      
      - name: Build with PyInstaller (${{ matrix.display_name }})
        run: |
          pyinstaller XiaoXueToolbox.spec --noconfirm
      
      - name: Create release package (${{ matrix.display_name }})
        run: |
          Compress-Archive -Path "dist\XiaoXueToolbox\*" -DestinationPath "XiaoXueToolbox_${{ steps.version.outputs.VERSION }}${{ matrix.suffix }}_Windows_x64.zip"
      
      - name: Upload artifact (${{ matrix.display_name }})
        uses: actions/upload-artifact@v4
        with:
          name: XiaoXue-Video-Tools-${{ steps.version.outputs.VERSION }}${{ matrix.suffix }}
          path: XiaoXueToolbox_${{ steps.version.outputs.VERSION }}${{ matrix.suffix }}_Windows_x64.zip
          retention-days: 14
      
      - name: Extract changelog
        if: startsWith(github.ref, 'refs/tags/')
        id: changelog
        shell: python
        run: |
          import re, os
          tag = os.environ.get("GITHUB_REF_NAME", "").lstrip("v")
          text = open("CHANGELOG.md", encoding="utf-8").read()
          pattern = r'(## \[' + re.escape(tag) + r'\].*?)(?=\n## \[|\Z)'
          m = re.search(pattern, text, re.DOTALL)
          if not m:
              m = re.search(r'(## \[\d+\.\d+\.\d+\].*?)(?=\n## \[|\Z)', text, re.DOTALL)
          body = m.group(1).strip() if m else "详见 CHANGELOG.md"
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as f:
              f.write("BODY<<CHANGELOG_EOF\n")
              f.write(body + "\n")
              f.write("CHANGELOG_EOF\n")

      - name: Create Pre-release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: XiaoXueToolbox_${{ steps.version.outputs.VERSION }}${{ matrix.suffix }}_Windows_x64.zip
          generate_release_notes: false
          draft: false
          prerelease: true
          name: "小雪工具箱 ${{ steps.version.outputs.VERSION }} (测试版)"
          body: |
            ## 小雪工具箱 ${{ steps.version.outputs.VERSION }} (测试版)
            
            > **这是一个测试版本 (Pre-release)**，可能包含未完成的功能或已知问题。
            > 仅供测试使用，不建议在生产环境中使用。
            
            ---
            
            ${{ steps.changelog.outputs.BODY }}
            
            ---
            详见 [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/dev/CHANGELOG.md)
